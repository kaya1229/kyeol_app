name: kyeol_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  # 아이콘 제작 로봇 소환!
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png" # 사용자님이 올린 파일 이름과 똑같아야 함!
  adaptive_icon_background: "#F5F5DC" # 아이콘 배경색 (베이지)
  adaptive_icon_foreground: "assets/icon/icon.png"
