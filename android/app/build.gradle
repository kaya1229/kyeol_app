plugins {
    id "com.android.application"
    id "kotlin-android"
    // 플러터 로봇이 요구한 최신 연결 방식입니다!
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.kyeol_app"
    compileSdkVersion 34

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.kyeol_app"
        // 안드로이드 5.0 이상 지원
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            // 테스트용이므로 디버그 서명을 사용합니다.
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

flutter {
    source '../..'
}

dependencies {
    // 코틀린 표준 라이브러리
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.0.0"
}
